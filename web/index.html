<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web Mic Forward</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="连接控制">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>Web Mic Forward</h1>
            <p id="statusLine">未连接</p>
          </div>
        </div>

        <div class="connection-grid">
          <label>
            <span>房间</span>
            <input id="roomInput" autocomplete="off" spellcheck="false" />
          </label>
          <label>
            <span>令牌</span>
            <input id="tokenInput" type="password" autocomplete="off" />
          </label>
          <label>
            <span>传输</span>
            <select id="transportSelect">
              <option value="sfu">Realtime SFU</option>
              <option value="ws">WebSocket PCM</option>
            </select>
          </label>
          <button id="connectButton" type="button">连接</button>
          <button id="disconnectButton" type="button" disabled>断开</button>
          <div class="client-url-row">
            <label>
              <span>客户端 WebSocket URL</span>
              <input id="clientUrlInput" readonly spellcheck="false" />
            </label>
            <button id="copyClientUrlButton" type="button">复制</button>
          </div>
        </div>
      </section>

      <section class="meter-panel" aria-label="麦克风波形">
        <div class="meter-header">
          <div>
            <h2>输入波形</h2>
            <p id="audioLine">麦克风未启动</p>
          </div>
          <div class="mic-actions">
            <button id="startMicButton" type="button">启动麦克风</button>
            <button id="stopMicButton" type="button" disabled>停止</button>
          </div>
        </div>
        <canvas id="waveCanvas" width="1280" height="320"></canvas>
      </section>

      <section class="control-panel" aria-label="音频控制">
        <div class="control-row">
          <label class="slider-label">
            <span>输入增益 <strong id="inputGainValue">100%</strong></span>
            <input id="inputGainInput" type="range" min="0" max="2000" step="25" value="100" />
          </label>

          <label class="slider-label">
            <span>静音门限 <strong id="thresholdValue">0.012</strong></span>
            <input id="thresholdInput" type="range" min="0.001" max="0.08" step="0.001" value="0.012" />
          </label>

          <label class="slider-label">
            <span>保留尾音 <strong id="hangoverValue">240 ms</strong></span>
            <input id="hangoverInput" type="range" min="0" max="800" step="20" value="240" />
          </label>

          <label class="toggle-label">
            <input id="gateInput" type="checkbox" checked />
            <span>静音省流</span>
          </label>
        </div>
      </section>

      <section class="stats-grid" aria-label="状态">
        <div>
          <span>门控</span>
          <strong id="gateState">关闭</strong>
        </div>
        <div>
          <span>RMS</span>
          <strong id="rmsValue">0.000</strong>
        </div>
        <div>
          <span>峰值</span>
          <strong id="peakValue">0.000</strong>
        </div>
        <div>
          <span>已发送</span>
          <strong id="sentValue">0 KB</strong>
        </div>
        <div>
          <span>已省略</span>
          <strong id="skippedValue">0</strong>
        </div>
        <div>
          <span>接收端</span>
          <strong id="clientValue">0</strong>
        </div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
